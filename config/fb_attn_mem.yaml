# configuration parsing starts here
defaults:
  - experiment: exp # experiment yaml file name in configurations/experiments folder [fixme]
  - dataset: flappy_bird_fast # dataset yaml file name in configurations/dataset folder [fixme]
  - algorithm: attn_mem_video # algorithm yaml file name in configurations/algorithm folder [fixme]
  - model: fb_attn_mem_dit # model yaml file name in configurations/model folder [fixme]
  - cluster: null # optional, cluster yaml file name in configurations/cluster folder. Leave null for local compute

debug: false # global debug flag will be passed into configuration of experiment, dataset and algorithm

wandb:
  entity: tychen0028 # wandb account name / organization name [fixme]
  project: diffusion-forcing # wandb project name; if not provided, defaults to root folder name [fixme]
  mode: offline # set wandb logging to online, offline or dryrun

resume: null # wandb run id to resume logging and loading checkpoint from
load: outputs/2025-02-18/05-52-37/checkpoints/epoch=0-step=42000.ckpt # wandb run id containing checkpoint or a path to a checkpoint file

name: fb_attn_mem

experiment:
  model_ckpt: null
  tasks: [training]
  training:
    lr: 2e-5
    precision: bf16-mixed
    devices: auto
    strategy: deepspeed
    batch_size: 8
    checkpointing:
      every_n_train_steps: 6000
    optim:
      accumulate_grad_batches: 1
  validation:
    precision: bf16-mixed
    strategy: deepspeed
    batch_size: 4
    limit_batch: 1
    val_every_n_step: 6000

dataset:
  n_frames: 32
  context_length: 4
  validation_multiplier: 2

algorithm:
  gradient_checkpointing: true
  mem_beta_lr: 1e-3
  vae_name: sd_vae
  vae_ckpt: stabilityai/sd-vae-ft-mse