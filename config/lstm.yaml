# configuration parsing starts here
hydra:
  run:
    dir: outputs/df/lstm_rotate

defaults:
  - experiment: exp # experiment yaml file name in configurations/experiments folder [fixme]
  - dataset: latent_pos # dataset yaml file name in configurations/dataset folder [fixme]
  - algorithm: latent_df # algorithm yaml file name in configurations/algorithm folder [fixme]
  - model: lstm_dit # model yaml file name in configurations/model folder [fixme]
  - cluster: null # optional, cluster yaml file name in configurations/cluster folder. Leave null for local compute

debug: false # global debug flag will be passed into configuration of experiment, dataset and algorithm

wandb:
  entity: tychen0028 # wandb account name / organization name [fixme]
  project: diffusion-forcing # wandb project name; if not provided, defaults to root folder name [fixme]
  mode: offline # set wandb logging to online, offline or dryrun

resume: null # wandb run id to resume logging and loading checkpoint from
load: null # wandb run id containing checkpoint or a path to a checkpoint file

name: lstm_rotate

experiment:
  model_ckpt: outputs/df/lstm/checkpoints/epoch=0-step=14000.ckpt # path to a pre-trained diffusion checkpoint
  tasks: [training]
  training:
    precision: bf16-mixed
    devices: auto
    strategy: deepspeed
    batch_size: 64
    max_epochs: 5
    checkpointing:
      every_n_train_steps: 1000
  validation:
    precision: bf16-mixed
    strategy: deepspeed
    batch_size: 8
    limit_batch: 1
    val_every_n_step: null
    val_every_n_epoch: 50
  
algorithm:
  warmup_steps: 1000
  external_cond_dim: 4
  strict_load_ckpt: false

dataset:
  n_frames: 40
  action_type: action
  metadata:
    - /home/tc0786/Project/train-oasis/data/mem_encoded_data/metadata_mem.json
  limit_video_length:
    - null

model:
  precision: bf16-mixed
