debug: ${debug}
lr: ${experiment.training.lr}

# dataset-dependent configurations
x_shape: ${model.observation_shape}
data_mean: ${dataset.data_mean}
data_std: ${dataset.data_std}
external_cond_dim: ${dataset.external_cond_dim}
context_frames: ${dataset.context_length}
chunk_size: 1

n_frames: ${dataset.n_frames}
frame_skip: ${dataset.frame_skip}

# No VAE encode/decode in the training loop — data is pre-encoded latents.
# Pixel decoding for DROID scoring uses the separate scoring_vae below.
vae_name: null
vae_ckpt: null
scaling_factor: 0.07843137255
max_vae_batch: 512

weight_decay: 2e-3
# Shorter ramp → full lr sooner (warmer start vs 500-step ramp).
warmup_steps: 100
optimizer_beta: [0.9, 0.99]
strategy: ${experiment.training.strategy}

save_video_every_n_step: 1000

diffusion:
  schedule_fn_kwargs: {}
  snr_clip: 5.0
  timesteps: 1000
  cum_snr_decay: 0.96
  clip_noise: 6.
  sampling_timesteps: 40
  stabilization_level: 15
  predict_v: true

metrics:
  - nothing

# ---- GRPO-specific ----
grpo:
  group_size: 4
  kl_coeff: 0.005
  max_gen_frames: 100
  # Generation speed/quality knobs for GRPO rollout:
  # - Smaller window matches fast_inference_droid behavior and is much faster.
  # - Fewer substeps per frame reduces denoising compute per generated frame.
  gen_window_frames: 10
  gen_substeps_per_frame: 2
  # GRPO loss horizon/checkpointing knobs:
  # - loss_frames caps how many generated frames are used in policy/ref loss.
  # - checkpointing inside GRPO loss is disabled by default to avoid
  #   torch.utils.checkpoint forward/recompute mismatch under bf16+DDP.
  loss_frames: 10
  use_checkpoint_in_grpo_loss: false

  # During Lightning validation: rollout with the policy, decode with scoring_vae,
  # log to W&B (if enabled) and write MP4s under Hydra ``outputs/.../val_videos/``.
  # (Parent DF validation assumes a pixel VAE on the module; GRPO uses latent data
  # and ``vae_name: null``, so this path is GRPO-specific.)
  val_save_video: true
  # Also write val MP4s once before training (global step 0); folder ``val_videos/step_0000000``.
  val_save_at_step_zero: true
  val_video_max_frames: 48
  val_video_fps: 20
  val_video_seed: 0

  # VAE decoder loaded solely for decoding latents to pixels for DROID scoring.
  scoring_vae:
    ckpt: /n/fs/videogen/train-oasis/models/oasis500m/vit-l-20.safetensors
    latent_dim: 16
    patch_size: 20
    enc_dim: 1024
    enc_depth: 6
    enc_heads: 16
    dec_dim: 1024
    dec_depth: 12
    dec_heads: 16
    input_height: 360
    input_width: 640

  droid:
    weights: /u/cz5047/videogen/data/models/droid_models/droid.pth
    calib: [500, 500, 256, 256]
    stride: 2
    buffer: 512
    filter_thresh: 0.01
    upsample: true
    resize: 256
    max_frames: 200
